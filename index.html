<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0C1E">
<title>PDV Pro — Pecuarão Gontijo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0C1E;color:#e8e9f0;font-family:'Sora',sans-serif}
  #root{min-height:100vh}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="app.min.js"></script>
<script>
// Lazy load CRM Module — só carrega quando necessário
window._crmLoaded = false;
window._loadCRM = function() {
  if (window._crmLoaded) return;
  window._crmLoaded = true;
  var s = document.createElement('script');
  s.src = 'crm-module.js';
  document.head.appendChild(s);
};
// Pré-carrega após 3s (quando o PDV já está pronto)
setTimeout(window._loadCRM, 3000);
</script>
<script>
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(PDVApp));
</script>
</body>
</html>
