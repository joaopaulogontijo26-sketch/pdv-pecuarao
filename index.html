// ── Impressão de etiquetas Elgin L42 Pro Full (1 coluna 30x60mm ou 3 colunas 20x30mm) ──

function printElginLabels(items, layout) {
  if (!items || items.length === 0) return;
  const w = window.open("", "_blank");
  const pageCss = layout === "1col" ? "@page{size:30mm 60mm;margin:0}body{margin:0}" : "@page{size:20mm 30mm;margin:0}body{margin:0}";
  const labelCss = layout === "1col" ? "width:30mm;height:60mm;padding:2mm 1.5mm;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;align-items:center;page-break-after:always;text-align:center;" : "width:20mm;height:30mm;padding:1mm;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;align-items:center;page-break-after:always;text-align:center;";
  const nomeSize = layout === "1col" ? "11px" : "7px";
  const precoSize = layout === "1col" ? "18px" : "11px";
  const labelsHtml = items.map(item => {
    const nome = (item.name || "").toUpperCase();
    const preco = item.price ? fmt(item.price) : "—";
    const code = item.barcode || "";
    return "<div class='label'>" + "<div style='font-size:" + nomeSize + ";font-weight:700;line-height:1.15;max-height:2.4em;overflow:hidden'>" + nome + "</div>" + "<div style='font-size:" + precoSize + ";font-weight:900;color:#000;margin:1mm 0'>" + preco + "</div>" + (code ? "<svg class='bc' data-code='" + code + "'></svg><div style='font-size:6px;letter-spacing:1px'>" + code + "</div>" : "") + "</div>";
  }).join("");
  const html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>Etiquetas</title>" + "<style>" + pageCss + "*{font-family:Arial,sans-serif}.label{" + labelCss + "border:0}" + (layout === "3col" ? ".wrap{display:flex;flex-wrap:wrap}" : "") + "</style></head><body>" + "<div class='wrap'>" + labelsHtml + "</div>" + "<script src='https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js'><" + "/script>" + "<script>" + "window.onload=function(){" + "document.querySelectorAll('.bc').forEach(function(el){" + "try{JsBarcode(el, el.getAttribute('data-code'), {format:'CODE128',width:1.3,height:28,displayValue:false,margin:0});}catch(e){}" + "});" + "setTimeout(function(){window.print();},350);" + "};" + "<" + "/script>" + "</body></html>";
  w.document.write(html);
  w.document.close();
}
const load = (k, d) => {
  try {
    const v = localStorage.getItem(k);
    return v ? JSON.parse(v) : d;
  } catch {
    return d;
  }
};
const save = (k, v) => {
  try {
    localStorage.setItem(k, JSON.stringify(v));
  } catch {}
};

// Combina dados do servidor com dados locais sem apagar registros que ainda
// não foram sincronizados (ex: venda feita offline / sync falhou por rede
// instável). O servidor "ganha" quando o mesmo id existe nos dois lados,
// mas um registro que só existe localmente NUNCA é descartado aqui — ele
// fica visível até a próxima sincronização conseguir enviá-lo pra frente.
// "excludeIds" são registros que o usuário excluiu por aqui: mesmo que o
// servidor ainda responda com eles (ex: o DELETE falhou por instabilidade
// de rede, ou ainda não terminou), eles não voltam a aparecer na tela.
// Chave e leitura da fila de envio. Definidas aqui em cima porque o mergeById
// (logo abaixo) precisa consultar a fila pra saber se um registro local ainda
// está pendente de envio ou se foi apagado em outro aparelho.
const _OUTBOX_KEY = "pdv_outbox";
const getOutbox = () => load(_OUTBOX_KEY, []);

// Combina dados do servidor com dados locais.
//
// A regra chave está em como tratar um item que existe SÓ no aparelho:
//   • Se ele está na fila de envio (outbox), é uma venda/pedido feito offline
//     que ainda não subiu → precisa ser mantido e reenviado.
//   • Se ele NÃO está na fila, é porque já subiu pro servidor um dia. Se agora
//     sumiu de lá, é porque foi APAGADO de propósito em outro aparelho →
//     precisa sumir daqui também, e nunca ser reenviado.
//
// Sem essa distinção, apagar uma venda no PC fazia o celular "ressuscitar" ela
// no próximo carregamento, achando que era um registro offline a sincronizar.
const mergeById = function (local, remote) {
  let excludeIds = arguments.length > 2 && arguments[2] !== undefined ? arguments[2] : null;
  let col = arguments.length > 3 ? arguments[3] : undefined;
  const map = new Map();
  const naFila = new Set(col ? getOutbox().filter(e => e.col === col).map(e => e.id) : []);
  (Array.isArray(remote) ? remote : []).forEach(r => {
    if (r && r.id != null && !(excludeIds && excludeIds.has(r.id))) map.set(r.id, r);
  });
  (Array.isArray(local) ? local : []).forEach(l => {
    if (!l || l.id == null) return;
    if (excludeIds && excludeIds.has(l.id)) return;
    if (map.has(l.id)) return;
    // Só sobrevive se ainda estiver pendente de envio. Caso contrário, foi
    // apagado em outro aparelho — deixa morrer.
    if (col && !naFila.has(l.id)) return;
    map.set(l.id, l);
  });
  return Array.from(map.values());
};

// ── EXCLUSÕES PENDENTES (tombstones) ──────────────────────────────────────────
// Registra localmente o que foi excluído, pra nunca "voltar" na tela mesmo se
// o DELETE no servidor demorar, falhar por rede instável, ou (caso mais comum)
// for bloqueado por permissão (RLS) no Supabase — nesse caso o item some da
// tela e o app tenta reenviar o DELETE sozinho a cada carregamento.
const _TOMB_KEY = "pdv_tombstones";
const getTombstones = () => load(_TOMB_KEY, {});
const addTombstone = (col, id) => {

// Baixa fotos do Supabase Storage e guarda no IndexedDB
const downloadPhotos = async (products, onProgress) => {
  const toDownload = products.filter(p => p.photo && p.photo.startsWith('http'));
  if (toDownload.length === 0) return 0;
  let done = 0;
  for (const p of toDownload) {
    // Verifica se já tem no cache
    const cached = await _photoDB.get(p.id);
    if (cached) {
      done++;
      if (onProgress) onProgress(done, toDownload.length);
      continue;
    }
    // Baixa do servidor
    try {
      const r = await fetch(p.photo);
      if (r.ok) {
        const blob = await r.blob();
        const reader = new FileReader();
        const b64 = await new Promise(res => {
          reader.onload = e => res(e.target.result);
          reader.readAsDataURL(blob);
        });
        await _photoDB.set(p.id, b64);
      }
    } catch (_) {}
    done++;
    if (onProgress) onProgress(done, toDownload.length);
  }
  return done;
};
